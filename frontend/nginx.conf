server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based responses to reduce payload size
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache hashed static assets aggressively (Vite adds hashes to filenames)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every unknown route returns index.html
    # so React's client-side routing works correctly
    location / {
        try_files $uri $uri/ /index.html;
    }
}